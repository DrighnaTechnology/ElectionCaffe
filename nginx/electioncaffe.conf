# =============================================================================
# ElectionCaffe - Nginx Reverse Proxy (Port-based, no SSL)
# For: Local VM access via IP, or dev environments without domain/SSL
#
# Usage:
#   sudo cp nginx/electioncaffe.conf /etc/nginx/sites-available/electioncaffe
#   sudo ln -sf /etc/nginx/sites-available/electioncaffe /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Access:
#   Web App (tenant):   http://VM_IP:80      (or http://VM_IP)
#   Super Admin:        http://VM_IP:8080
#   API Gateway:        http://VM_IP/api/*   (proxied to localhost:3000)
# =============================================================================

# ── Upstream Backends ────────────────────────────────────────────────────────
upstream ec_gateway {
    server 127.0.0.1:3000;
}

upstream ec_super_admin_service {
    server 127.0.0.1:3008;
}

# =============================================================================
# Web App — port 80 (tenant/voter-facing)
# Serves: apps/web/dist as static + proxies /api/* to gateway
# Tenant slug is extracted from subdomain by the gateway via Host header
# =============================================================================
server {
    listen 80;
    server_name _;

    # Frontend — serve Vite build as static files
    root /var/www/electioncaffe/apps/web/dist;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ── API proxy → Gateway (all microservices behind gateway) ───────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://ec_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # File uploads
        client_max_body_size 50M;
    }

    # ── WebSocket proxy for Socket.IO ────────────────────────────────────
    location /socket.io/ {
        proxy_pass http://ec_gateway;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Auth rate limiting ───────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://ec_gateway;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

# =============================================================================
# Super Admin — port 8080 (internal admin panel)
# Serves: apps/super-admin/dist as static + proxies /api/* to super-admin-service
# =============================================================================
server {
    listen 8080;
    server_name _;

    # Frontend — serve Vite build as static files
    root /var/www/electioncaffe/apps/super-admin/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 1000;

    # ── API proxy → Super Admin Service ──────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://ec_super_admin_service;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        client_max_body_size 50M;
    }

    # ── Auth rate limiting ───────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://ec_super_admin_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Cache static assets ──────────────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ── Health check ─────────────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
