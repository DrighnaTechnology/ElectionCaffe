# =============================================================================
# ElectionCaffe - Dev/Staging Server Configuration
#
# For: election.datacaffe.in (dev) with tenant subdomains
#
# Domains:
#   election.datacaffe.in       → Landing/marketing page
#   admin.election.datacaffe.in → Super Admin dashboard
#   *.election.datacaffe.in     → Tenant subdomains
#
# SSL:
#   sudo certbot certonly --manual --preferred-challenges dns \
#     -d election.datacaffe.in -d '*.election.datacaffe.in' \
#     -d admin.election.datacaffe.in
#
# NOTE: To use IP-based access instead (no domain), use electioncaffe.conf
# =============================================================================

# ── HTTP → HTTPS Redirect (all dev domains) ─────────────────────────────────
server {
    listen 80;
    server_name election.datacaffe.in *.election.datacaffe.in admin.election.datacaffe.in;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Dev Landing Page — https://election.datacaffe.in
# =============================================================================
server {
    listen 443 ssl http2;
    server_name election.datacaffe.in;

    ssl_certificate /etc/letsencrypt/live/election.datacaffe.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/election.datacaffe.in/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    root /var/www/electioncaffe/apps/web/dist;
    index index.html;

    # API proxy → Gateway
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;
        client_max_body_size 50M;
    }

    # WebSocket proxy
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 7d;
            add_header Cache-Control "public";
        }
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
}

# =============================================================================
# Dev Super Admin — https://admin.election.datacaffe.in
# =============================================================================
