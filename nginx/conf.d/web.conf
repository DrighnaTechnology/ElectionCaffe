# =============================================================================
# ElectionCaffe - Web App (Production SSL)
#
# Domains:
#   election.datacaffe.ai       → Landing/marketing page
#   *.election.datacaffe.ai     → Tenant subdomains (e.g. mumbai-bjp.election.datacaffe.ai)
#
# SSL:
#   Wildcard certificate required: *.election.datacaffe.ai
#   sudo certbot certonly --manual --preferred-challenges dns \
#     -d election.datacaffe.ai -d '*.election.datacaffe.ai'
#
# Architecture:
#   Static files: /var/www/electioncaffe/apps/web/dist
#   API:          Proxied to gateway (localhost:3000)
#   Tenant slug:  Extracted from Host header by the gateway/auth-service
# =============================================================================

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name election.datacaffe.ai *.election.datacaffe.ai;

    # Allow certbot challenge over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# Landing Page — https://election.datacaffe.ai
# Same app, but no tenant context. Shows public landing/marketing page.
# =============================================================================
server {
    listen 443 ssl http2;
    server_name election.datacaffe.ai;

    # SSL Configuration (wildcard cert covers both root + subdomains)
    ssl_certificate /etc/letsencrypt/live/election.datacaffe.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/election.datacaffe.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (2 years)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Static files
    root /var/www/electioncaffe/apps/web/dist;
    index index.html;

    # ── API proxy (for public endpoints like login, registration) ────────
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        proxy_connect_timeout 60;
        proxy_send_timeout 90;
        client_max_body_size 50M;
    }

    # Auth rate limiting
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for Socket.IO
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

# =============================================================================
# Tenant Subdomains — https://<slug>.election.datacaffe.ai
# Wildcard catch-all. Same app as landing page, but the gateway resolves
# tenant context from the Host header (e.g. "mumbai-bjp" from
# "mumbai-bjp.election.datacaffe.ai").
#
# This block MUST come after the exact server_name block above.
# Nginx matches exact names first, then wildcards.
# =============================================================================
server {
    listen 443 ssl http2;
    server_name *.election.datacaffe.ai;

    # SSL Configuration (same wildcard cert)
    ssl_certificate /etc/letsencrypt/live/election.datacaffe.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/election.datacaffe.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Same static files — tenant context resolved server-side
    root /var/www/electioncaffe/apps/web/dist;
    index index.html;

    # ── API proxy → Gateway ──────────────────────────────────────────────
    # The gateway extracts tenant slug from the Host header automatically
    location /api/ {
        limit_req zone=api burst=50 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120;
        proxy_connect_timeout 60;
        proxy_send_timeout 120;
        client_max_body_size 50M;
    }

    # Auth rate limiting
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket proxy for Socket.IO (real-time election updates)
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Long-running endpoints (AI analytics, report generation) ─────────
    location ~ ^/api/(ai-analytics|reporting)/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
        proxy_send_timeout 600;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
