# =============================================================================
# ElectionCaffe - Super Admin (Production SSL)
#
# Domain: admin.election.datacaffe.ai
#
# SSL:
#   sudo certbot --nginx -d admin.election.datacaffe.ai
#
# Architecture:
#   Static files: /var/www/electioncaffe/apps/super-admin/dist
#   API:          Proxied to super-admin-service (localhost:3008)
# =============================================================================

# ── HTTP → HTTPS Redirect ────────────────────────────────────────────────────
server {
    listen 80;
    server_name admin.election.datacaffe.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# =============================================================================
# Super Admin — https://admin.election.datacaffe.ai
# =============================================================================
server {
    listen 443 ssl http2;
    server_name admin.election.datacaffe.ai;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/admin.election.datacaffe.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.election.datacaffe.ai/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (2 years)
    add_header Strict-Transport-Security "max-age=63072000" always;

    # Static files
    root /var/www/electioncaffe/apps/super-admin/dist;
    index index.html;

    # ── Long-running endpoints (tenant provisioning, bulk operations) ────
    location ~ ^/api/(tenants/provision|bulk-|import|export) {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 600;
        proxy_connect_timeout 60;
        proxy_send_timeout 600;
    }

    # ── Backend API Proxy (/api) ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 90;
        proxy_connect_timeout 60;
        proxy_send_timeout 90;
        client_max_body_size 50M;
    }

    # ── Auth rate limiting ───────────────────────────────────────────────
    location /api/auth/login {
        limit_req zone=login burst=5 nodelay;

        proxy_pass http://127.0.0.1:3008;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Frontend Static Files ────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
