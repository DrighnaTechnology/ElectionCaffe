<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ElectionCaffe - Election Management Platform</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
      /* Hide Google Translate top bar */
      .goog-te-banner-frame { display: none !important; }
      body { top: 0 !important; }
      /* Hide default branding text */
      .goog-te-gadget > span { display: none !important; }
      .goog-te-gadget { font-size: 0 !important; }
      /* Style the language select dropdown */
      .goog-te-combo {
        padding: 8px 12px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        font-size: 14px;
        background: white;
        cursor: pointer;
        min-width: 180px;
        outline: none;
      }
      .goog-te-combo:focus { border-color: #f97316; box-shadow: 0 0 0 2px rgba(249,115,22,0.2); }
      /* Position the translate widget container */
      #google_translate_element {
        display: none;
        position: fixed;
        z-index: 9999;
        background: white;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      }
      #google_translate_element.show { display: block; }
    </style>
  </head>
  <body>
    <div id="google_translate_element"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      function googleTranslateElementInit() {
        new google.translate.TranslateElement({
          pageLanguage: 'en',
          includedLanguages: 'hi,bn,ta,te,kn,ml,mr,gu,pa,or,ur,as,en',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
      }
    </script>
    <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
  </body>
</html>
